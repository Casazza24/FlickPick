services:
  db:
    image: postgres:14
    env_file: .env
    expose:
      - '5432'
    volumes:
      - flickpick-db:/var/lib/postgresql/data
      - ./src/init_data:/docker-entrypoint-initdb.d

  web:
    build: .
    env_file: .env
    environment:
      - NODE_ENV=development
      - DB_HOST=db
    depends_on:
      - db
    ports:
      - '3000:3000'
    volumes:
      - ./src:/app/src

volumes:
  flickpick-db:
